<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Rectangle Packing Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .checkerboard {
            background-color: #111827;
            background-image: 
                linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937),
                linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .rect-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- Sidebar Controls -->
    <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col h-full z-10 shadow-xl shrink-0">
        <div class="p-5 border-b border-gray-700">
            <h1 class="text-xl font-bold flex items-center gap-2 text-white">
                <i data-lucide="layout-dashboard" class="w-6 h-6 text-blue-400"></i>
                Treemap Engine
            </h1>
            <p class="text-xs text-gray-400 mt-1">Perfect space-filling packing prototype</p>
        </div>

        <div class="p-5 flex-1 overflow-y-auto space-y-6">
            <!-- Data Input -->
            <div class="space-y-3">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="image" class="w-4 h-4"></i> Data Source
                </h3>
                
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Load Local Images</label>
                    <input type="file" id="fileInput" multiple accept="image/*" class="block w-full text-sm text-gray-400
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-md file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-600 file:text-white
                        hover:file:bg-blue-700 cursor-pointer bg-gray-900 rounded-md border border-gray-700">
                </div>

                <div class="flex gap-2">
                    <button id="btnGenerateMock" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-xs py-2 px-3 rounded flex items-center justify-center gap-2 transition-colors">
                        <i data-lucide="shuffle" class="w-3 h-3"></i> Generate Random Blocks
                    </button>
                    <button id="btnClear" class="bg-red-900/50 hover:bg-red-800/80 text-red-200 text-xs py-2 px-3 rounded flex items-center justify-center transition-colors" title="Clear All">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                </div>
            </div>

            <hr class="border-gray-700">

            <!-- Container Dimensions -->
            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="maximize" class="w-4 h-4"></i> Container
                </h3>
                
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Width</label>
                        <span id="valWidth" class="text-blue-400 font-mono">800px</span>
                    </div>
                    <input type="range" id="containerWidth" min="300" max="2400" value="800" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Height</label>
                        <span id="valHeight" class="text-blue-400 font-mono">600px</span>
                    </div>
                    <input type="range" id="containerHeight" min="300" max="2000" value="600" class="w-full accent-blue-500">
                </div>
            </div>

            <hr class="border-gray-700">

            <!-- Algorithm Settings -->
            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="cpu" class="w-4 h-4"></i> Algorithm Settings
                </h3>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">Weighting Logic</label>
                    <select id="weighting" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:border-blue-500 outline-none">
                        <option value="area">By Natural Image Area</option>
                        <option value="equal">Equal Weights</option>
                        <option value="random">Randomized Weights</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">Sorting</label>
                    <select id="sorting" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:border-blue-500 outline-none">
                        <option value="desc">Descending (Largest first - Best)</option>
                        <option value="asc">Ascending (Smallest first)</option>
                        <option value="none">Unsorted (Original order)</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Gap</label>
                        <span id="valGap" class="text-blue-400 font-mono">2px</span>
                    </div>
                    <input type="range" id="gap" min="0" max="20" value="2" class="w-full accent-blue-500">
                </div>
            </div>

            <hr class="border-gray-700">

            <!-- Styling & Effects -->
            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="palette" class="w-4 h-4"></i> Styling & Effects
                </h3>
                
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Background Color</label>
                        <span id="valBgColor" class="text-blue-400 font-mono">#1F2937</span>
                    </div>
                    <input type="color" id="bgColor" value="#1f2937" class="w-full h-8 cursor-pointer bg-gray-900 border border-gray-700 rounded p-1">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Block Rotation</label>
                        <span id="valRotation" class="text-blue-400 font-mono">0°</span>
                    </div>
                    <input type="range" id="rotation" min="0" max="360" value="0" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Corner Radius</label>
                        <span id="valRadius" class="text-blue-400 font-mono">0px</span>
                    </div>
                    <input type="range" id="radius" min="0" max="50" value="0" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Book Cover Spine Width</label>
                        <span id="valBookCover" class="text-blue-400 font-mono">0%</span>
                    </div>
                    <input type="range" id="bookCover" min="0" max="100" value="0" class="w-full accent-blue-500">
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative checkerboard">
        <!-- Canvas Area (Utilizes safe grid centering to prevent top/left clipping) -->
        <div id="canvasContainer" class="flex-1 overflow-auto grid p-8" style="place-content: center safe;">
            <!-- scaleWrapper matches the exact physical bounds of the zoomed canvas so scrollbars activate perfectly -->
            <div id="scaleWrapper" class="transition-all duration-200 relative shrink-0" style="width: 800px; height: 600px;">
                <div id="renderCanvas" class="shadow-2xl absolute top-0 left-0 overflow-hidden ring-1 ring-gray-700 transition-transform duration-200" style="width: 800px; height: 600px; transform-origin: top left; background-color: #1f2937;">
                    <!-- Rectangles injected here via gridWrapper -->
                    <div class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm italic empty-state z-50 pointer-events-none">
                        Upload images or generate mock blocks to begin...
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Zoom Controls (Fixed so they never leave the viewport) -->
        <div class="fixed bottom-20 right-8 flex gap-1 z-50 bg-gray-800 p-1.5 rounded-lg border border-gray-700 shadow-xl opacity-90 hover:opacity-100">
            <button id="btnZoomOut" class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition-colors" title="Zoom Out"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
            <span id="zoomLabel" class="flex items-center justify-center w-12 text-xs font-mono text-gray-300">100%</span>
            <button id="btnZoomIn" class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition-colors" title="Zoom In"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
        </div>

        <!-- Metrics & Export Footer -->
        <footer class="bg-gray-900 border-t border-gray-800 p-4 flex justify-between items-center text-sm px-6">
            <div class="flex gap-8">
                <div class="flex items-center gap-2">
                    <i data-lucide="layers" class="w-4 h-4 text-gray-500"></i>
                    <span class="text-gray-400">Items:</span>
                    <span id="metricCount" class="font-mono text-white">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="box" class="w-4 h-4 text-gray-500"></i>
                    <span class="text-gray-400">Layout Height:</span>
                    <span id="metricSpace" class="font-mono text-blue-400">Dynamic Height (Justified)</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="scaling" class="w-4 h-4 text-gray-500"></i>
                    <span class="text-gray-400">Worst Aspect Ratio:</span>
                    <span id="metricRatio" class="font-mono text-white">N/A</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnExportJPG" class="bg-gray-700 hover:bg-blue-600 text-white text-xs py-2 px-4 rounded flex items-center justify-center transition-colors shadow-md">
                    <i data-lucide="download" class="w-3 h-3 mr-2"></i> .JPG (Filled)
                </button>
                <button id="btnExportPNG" class="bg-gray-700 hover:bg-blue-600 text-white text-xs py-2 px-4 rounded flex items-center justify-center transition-colors shadow-md">
                    <i data-lucide="download" class="w-3 h-3 mr-2"></i> .PNG (Transparent)
                </button>
            </div>
        </footer>
    </main>

    <script>
        lucide.createIcons();

        // --- Core State ---
        let rawItems = [];
        let calculatedLayout = [];
        let zoomLevel = 1;
        const state = {
            width: 800,
            height: 600,
            weighting: 'area',
            sorting: 'desc',
            gap: 2,
            backgroundColor: '#1f2937',
            rotation: 0,
            borderRadius: 0,
            bookCover: 0
        };

        // --- DOM Elements ---
        const canvas = document.getElementById('renderCanvas');
        const emptyState = document.querySelector('.empty-state');
        
        // --- Event Listeners for Controls ---
        const bindSlider = (id, stateKey, labelId, suffix = 'px') => {
            const el = document.getElementById(id);
            const label = document.getElementById(labelId);
            el.addEventListener('input', (e) => {
                state[stateKey] = parseInt(e.target.value);
                label.textContent = state[stateKey] + suffix;
                if(stateKey === 'width' || stateKey === 'height') {
                    canvas.style.width = state.width + 'px';
                    // Height is handled dynamically in triggerLayout
                }
                triggerLayout();
            });
        };

        const bindSelect = (id, stateKey) => {
            document.getElementById(id).addEventListener('change', (e) => {
                state[stateKey] = e.target.value;
                triggerLayout();
            });
        };

        const bindColor = (id, stateKey, labelId) => {
            const el = document.getElementById(id);
            const label = document.getElementById(labelId);
            el.addEventListener('input', (e) => {
                state[stateKey] = e.target.value;
                label.textContent = e.target.value.toUpperCase();
                canvas.style.backgroundColor = state[stateKey];
            });
        };

        bindSlider('containerWidth', 'width', 'valWidth');
        bindSlider('containerHeight', 'height', 'valHeight');
        bindSlider('gap', 'gap', 'valGap');
        bindSlider('rotation', 'rotation', 'valRotation', '°');
        bindSlider('radius', 'borderRadius', 'valRadius');
        bindSlider('bookCover', 'bookCover', 'valBookCover', '%');
        
        bindColor('bgColor', 'backgroundColor', 'valBgColor');
        
        bindSelect('weighting', 'weighting');
        bindSelect('sorting', 'sorting');

        // --- Data Input Handling ---
        document.getElementById('btnGenerateMock').addEventListener('click', () => {
            const count = Math.floor(Math.random() * 15) + 5; // 5 to 20 items
            const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'];
            rawItems = Array.from({length: count}).map((_, i) => ({
                id: `mock_${Date.now()}_${i}`,
                type: 'color',
                color: colors[Math.floor(Math.random() * colors.length)],
                naturalWidth: Math.floor(Math.random() * 800) + 200,
                naturalHeight: Math.floor(Math.random() * 600) + 200,
            }));
            triggerLayout();
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            rawItems = [];
            triggerLayout();
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            const newItems = await Promise.all(files.map(file => {
                return new Promise((resolve) => {
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    img.onload = () => {
                        resolve({
                            id: `img_${file.name}_${Date.now()}`,
                            type: 'image',
                            url: url,
                            imgElement: img,
                            naturalWidth: img.width,
                            naturalHeight: img.height,
                            name: file.name
                        });
                    };
                    img.src = url;
                });
            }));
            
            rawItems = [...rawItems, ...newItems];
            triggerLayout();
        });

        // --- Core Layout Engine ---

        function triggerLayout() {
            emptyState.style.display = rawItems.length ? 'none' : 'flex';
            if (rawItems.length === 0) {
                canvas.innerHTML = '';
                canvas.appendChild(emptyState);
                updateMetrics([], 0);
                return;
            }

            // 1. Assign Weights based on user config
            let processingItems = rawItems.map(item => {
                let weight = 1;
                if (state.weighting === 'area') weight = item.naturalWidth * item.naturalHeight;
                if (state.weighting === 'random') weight = Math.random() * 100 + 10;
                return { ...item, weight };
            });

            // 2. Sort data
            if (state.sorting === 'desc') processingItems.sort((a, b) => b.weight - a.weight);
            if (state.sorting === 'asc') processingItems.sort((a, b) => a.weight - b.weight);

            // 3. Normalize Weights
            const totalWeight = processingItems.reduce((sum, i) => sum + i.weight, 0);
            const totalArea = state.width * state.height;
            processingItems = processingItems.map(item => ({
                ...item,
                normalizedWeight: (item.weight / totalWeight) * totalArea
            }));

            // 4. Run Justified Algorithm passing the gap size
            calculatedLayout = justifiedGallery(processingItems, 0, 0, state.width, state.height, state.gap);

            // 5. Render
            renderLayout(calculatedLayout);
        }

        // --- Layout Algorithms ---
        // Justified Gallery (Preserves Aspect Ratios - Used by Flickr/Google Photos)
        function justifiedGallery(items, x, y, w, h, gap = 0) {
            let layout = [];
            let currentY = y;
            let row = [];
            let i = 0;
            
            while (i < items.length) {
                let item = items[i];
                let aspect = (item.naturalWidth / item.naturalHeight) || 1;
                row.push({...item, aspect});
                i++;
                
                let aspectSum = row.reduce((sum, r) => sum + r.aspect, 0);
                
                // Calculate available width for images by subtracting the total gap width needed for this row
                let gapWidth = Math.max(0, (row.length - 1) * gap);
                let availableWidth = Math.max(1, w - gapWidth);
                let rowHeight = availableWidth / aspectSum;
                
                if (rowHeight < h * 0.5 || i === items.length) {
                    let currentX = x;
                    row.forEach(r => {
                        let rWidth = rowHeight * r.aspect;
                        layout.push({ ...r, x: currentX, y: currentY, w: rWidth, h: rowHeight });
                        currentX += rWidth + gap;
                    });
                    currentY += rowHeight + gap;
                    row = []; 
                }
            }
            return layout;
        }

        // --- Rendering Engine ---
        function renderLayout(layoutData) {
            canvas.innerHTML = '';
            canvas.appendChild(emptyState);
            let worstRatioVal = 0;
            let totalRenderedArea = 0;

            // Determine final height needed
            const maxLayoutY = layoutData.length ? Math.max(...layoutData.map(r => r.y + r.h)) : state.height;
            const layoutHeight = maxLayoutY;
            canvas.style.height = `${layoutHeight}px`;

            // Block Rotation: Calculate scale requirement to crop cleanly inside rotated whole-layout box
            const rad = state.rotation * Math.PI / 180;
            const cos = Math.abs(Math.cos(rad));
            const sin = Math.abs(Math.sin(rad));
            const scaleFactor = cos + Math.max(layoutHeight / state.width, state.width / layoutHeight) * sin;

            // Container to rotate the entire block of rectangles natively
            const gridWrapper = document.createElement('div');
            gridWrapper.className = 'w-full h-full absolute inset-0';
            gridWrapper.style.transformOrigin = 'center';
            gridWrapper.style.transform = `rotate(${state.rotation}deg) scale(${scaleFactor})`;
            gridWrapper.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';

            layoutData.forEach(rect => {
                let ratio = Math.max(rect.w / rect.h, rect.h / rect.w);
                if (ratio > worstRatioVal) worstRatioVal = ratio;
                totalRenderedArea += (rect.w * rect.h);

                const el = document.createElement('div');
                el.className = 'rect-item absolute group';
                
                el.style.left = `${rect.x}px`;
                el.style.top = `${rect.y}px`;
                el.style.width = `${rect.w}px`;
                el.style.height = `${rect.h}px`;
                
                const inner = document.createElement('div');
                // Use exact calculated w/h without artificial CSS padding margins
                inner.style.borderRadius = `${state.borderRadius}px`;
                inner.className = `relative w-full h-full shadow-sm overflow-hidden ${rect.type === 'color' ? 'bg-gray-800' : ''} transition-transform duration-200 hover:scale-[1.02] hover:z-10 hover:shadow-lg border border-gray-700/50`;

                if (rect.type === 'image') {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'w-full h-full relative flex items-center justify-center';
                    
                    const img = document.createElement('img');
                    img.src = rect.url;
                    img.className = `w-full h-full object-cover`; // Since layout exactly matches aspect, this effectively means exact fit
                    imgContainer.appendChild(img);
                    inner.appendChild(imgContainer);
                } else {
                    inner.style.backgroundColor = rect.color;
                }

                // Dynamic Book Cover Effect mapped to the slider
                if (state.bookCover > 0) {
                    const overlay = document.createElement('div');
                    overlay.className = 'absolute inset-0 pointer-events-none z-10';
                    const w = state.bookCover; // scales gradient stops dynamically
                    overlay.style.background = `
                        linear-gradient(to right, 
                            rgba(255,255,255,0.4) 0%, 
                            rgba(0,0,0,0.2) ${w * 0.4}%, 
                            rgba(255,255,255,0.5) ${w * 0.6}%, 
                            rgba(0,0,0,0.1) ${w * 1.0}%, 
                            rgba(0,0,0,0) 100%),
                        linear-gradient(to left, 
                            rgba(0,0,0,0.3) 0%, 
                            rgba(0,0,0,0) ${w * 0.4}%)`;
                    inner.appendChild(overlay);
                }

                // Debug overlay
                const debugInfo = document.createElement('div');
                debugInfo.className = 'absolute inset-0 bg-black/70 text-white text-[10px] p-2 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-center items-center pointer-events-none text-center leading-tight font-mono z-20';
                debugInfo.innerHTML = `
                    <span class="font-bold truncate w-full mb-1">${rect.name || rect.id}</span>
                    ${Math.round(rect.w)} x ${Math.round(rect.h)}<br>
                    Ratio: ${ratio.toFixed(2)}:1
                `;
                inner.appendChild(debugInfo);

                el.appendChild(inner);
                gridWrapper.appendChild(el);
            });

            canvas.appendChild(gridWrapper);
            updateMetrics(layoutData, worstRatioVal, totalRenderedArea);
            updateZoom(); // Synchronize the viewport wrapper with the newly computed layout height
        }

        function updateMetrics(layout, worstRatio, area) {
            document.getElementById('metricCount').textContent = layout.length;
            
            const spaceEl = document.getElementById('metricSpace');
            
            if (layout.length === 0) {
                spaceEl.textContent = 'N/A';
                spaceEl.className = 'font-mono text-gray-500';
            } else {
                spaceEl.textContent = 'Dynamic Height (Justified)';
                spaceEl.className = 'font-mono text-blue-400';
            }

            const ratioEl = document.getElementById('metricRatio');
            ratioEl.textContent = layout.length ? `${worstRatio.toFixed(2)}:1` : 'N/A';
            if(worstRatio > 4) ratioEl.className = 'font-mono text-red-400';
            else if(worstRatio > 2) ratioEl.className = 'font-mono text-yellow-400';
            else ratioEl.className = 'font-mono text-green-400';
        }

        // --- Zoom Controls ---
        function updateZoom() {
            const canvas = document.getElementById('renderCanvas');
            const wrapper = document.getElementById('scaleWrapper');
            
            // Scale the canvas visually
            canvas.style.transform = `scale(${zoomLevel})`;
            document.getElementById('zoomLabel').textContent = `${Math.round(zoomLevel * 100)}%`;
            
            // Adjust the invisible wrapper explicitly so scrollbars trigger seamlessly
            if (wrapper) {
                const currentHeight = parseFloat(canvas.style.height) || state.height;
                wrapper.style.width = `${state.width * zoomLevel}px`;
                wrapper.style.height = `${currentHeight * zoomLevel}px`;
            }
        }

        document.getElementById('btnZoomIn').addEventListener('click', () => { zoomLevel = Math.min(zoomLevel + 0.1, 3); updateZoom(); });
        document.getElementById('btnZoomOut').addEventListener('click', () => { zoomLevel = Math.max(zoomLevel - 0.1, 0.1); updateZoom(); });

        // --- Export Engine ---
        function exportLayout(format = 'image/png', ext = 'png') {
            if (calculatedLayout.length === 0) return alert("Nothing to export!");

            const maxLayoutY = Math.max(...calculatedLayout.map(r => r.y + r.h));
            const exportHeight = maxLayoutY;

            const offCanvas = document.createElement('canvas');
            offCanvas.width = state.width;
            offCanvas.height = exportHeight;
            const ctx = offCanvas.getContext('2d');
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            // Background Fill (Solid for JPEG, Clear for PNG for transparent padding)
            if (format === 'image/jpeg') {
                ctx.fillStyle = state.backgroundColor; 
                ctx.fillRect(0, 0, state.width, exportHeight);
            } else {
                ctx.clearRect(0, 0, state.width, exportHeight);
            }

            // Apply global block rotation / scale to context before drawing anything
            const rad = state.rotation * Math.PI / 180;
            const cos = Math.abs(Math.cos(rad));
            const sin = Math.abs(Math.sin(rad));
            const scaleFactor = cos + Math.max(exportHeight / state.width, state.width / exportHeight) * sin;

            ctx.save();
            ctx.translate(state.width / 2, exportHeight / 2);
            ctx.rotate(rad);
            ctx.scale(scaleFactor, scaleFactor);
            ctx.translate(-state.width / 2, -exportHeight / 2);

            // Render each layout element precisely to canvas in their unrotated block format
            calculatedLayout.forEach(rect => {
                const innerW = rect.w;
                const innerH = rect.h;
                const drawX = rect.x;
                const drawY = rect.y;

                ctx.save();
                
                // Establish clipping path for border radius
                ctx.beginPath();
                const maxRadius = Math.min(innerW / 2, innerH / 2, state.borderRadius);
                if (ctx.roundRect) {
                    ctx.roundRect(drawX, drawY, innerW, innerH, maxRadius);
                } else {
                    ctx.rect(drawX, drawY, innerW, innerH);
                }
                ctx.clip();

                if (rect.type === 'image' && rect.imgElement) {
                    if (format === 'image/jpeg') {
                        ctx.fillStyle = state.backgroundColor;
                        ctx.fillRect(drawX, drawY, innerW, innerH);
                    } // Left empty for PNG to keep padding/letterbox transparent!

                    // With Justified layout, images perfectly fit the calculated bounds natively
                    const renderW = innerW;
                    const renderH = innerH;
                    const renderX = drawX;
                    const renderY = drawY;

                    ctx.drawImage(rect.imgElement, renderX, renderY, renderW, renderH);

                } else {
                    ctx.fillStyle = rect.color || '#374151';
                    ctx.fillRect(drawX, drawY, innerW, innerH);
                }

                // Render Dynamic Book Cover inside the same clipped area
                if (state.bookCover > 0) {
                    const w = state.bookCover / 100;
                    
                    const grad1 = ctx.createLinearGradient(drawX, drawY, drawX + innerW, drawY);
                    grad1.addColorStop(0, 'rgba(255,255,255,0.4)');
                    grad1.addColorStop(Math.min(1, w * 0.4), 'rgba(0,0,0,0.2)');
                    grad1.addColorStop(Math.min(1, w * 0.6), 'rgba(255,255,255,0.5)');
                    grad1.addColorStop(Math.min(1, w * 1.0), 'rgba(0,0,0,0.1)');
                    grad1.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad1;
                    ctx.fillRect(drawX, drawY, innerW, innerH);

                    const grad2 = ctx.createLinearGradient(drawX + innerW, drawY, drawX, drawY);
                    grad2.addColorStop(0, 'rgba(0,0,0,0.3)');
                    grad2.addColorStop(Math.min(1, w * 0.4), 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad2;
                    ctx.fillRect(drawX, drawY, innerW, innerH);
                }

                ctx.restore(); // Drop the clip path for the next rectangle
            });

            ctx.restore(); // Restore global context transformation

            const link = document.createElement('a');
            link.download = `treemap_layout.${ext}`;
            link.href = offCanvas.toDataURL(format, ext === 'jpg' ? 1.0 : undefined);
            link.click();
        }

        document.getElementById('btnExportPNG').addEventListener('click', () => exportLayout('image/png', 'png'));
        document.getElementById('btnExportJPG').addEventListener('click', () => exportLayout('image/jpeg', 'jpg'));

    </script>
</body>
</html>
