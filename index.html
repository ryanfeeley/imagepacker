<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Rectangle Packing Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .checkerboard {
            background-color: #111827;
            background-image: 
                linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937),
                linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- Sidebar Controls -->
    <aside class="w-[340px] bg-gray-800 border-r border-gray-700 flex flex-col h-full z-10 shadow-xl shrink-0">
        <div class="p-5 border-b border-gray-700">
            <h1 class="text-xl font-bold flex items-center gap-2 text-white">
                <i data-lucide="layout-dashboard" class="w-6 h-6 text-blue-400"></i>
                Treemap Engine
            </h1>
            <p class="text-xs text-gray-400 mt-1">Justified packing prototype</p>
        </div>

        <div class="p-5 flex-1 overflow-y-auto space-y-6">
            <!-- Data Input -->
            <div class="space-y-3">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="image" class="w-4 h-4"></i> Data Source
                </h3>
                
                <div>
                    <input type="file" id="fileInput" multiple accept="image/*" class="block w-full text-sm text-gray-400
                        file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold
                        file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer bg-gray-900 rounded-md border border-gray-700">
                </div>

                <div class="flex gap-2">
                    <button id="btnGenerateMock" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-xs py-2 px-3 rounded flex items-center justify-center gap-2 transition-colors">
                        <i data-lucide="shuffle" class="w-3 h-3"></i> Mock Blocks
                    </button>
                    <button id="btnClear" class="bg-red-900/50 hover:bg-red-800/80 text-red-200 text-xs py-2 px-3 rounded flex items-center justify-center transition-colors" title="Clear All">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                </div>
            </div>

            <hr class="border-gray-700">

            <!-- Container Dimensions -->
            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="maximize" class="w-4 h-4"></i> Container
                </h3>
                
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Target Width</label>
                        <span id="valWidth" class="text-blue-400 font-mono">800px</span>
                    </div>
                    <input type="range" id="containerWidth" min="300" max="2400" value="800" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Target Height</label>
                        <span id="valHeight" class="text-blue-400 font-mono">600px</span>
                    </div>
                    <input type="range" id="containerHeight" min="300" max="2000" value="600" class="w-full accent-blue-500">
                </div>
            </div>

            <hr class="border-gray-700">

            <!-- Layout Strategy Engine -->
            <div class="space-y-4 bg-gray-900/50 p-3 rounded-lg border border-gray-700/50">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="network" class="w-4 h-4 text-blue-400"></i> Layout Strategy
                </h3>

                <div>
                    <select id="layoutMode" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-sm text-white focus:border-blue-500 outline-none font-semibold">
                        <option value="justifiedRows">Justified Rows</option>
                        <option value="justifiedColumns">Justified Columns</option>
                    </select>
                    <p id="modeDesc" class="text-xs text-gray-400 mt-2 leading-tight italic"></p>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">Weighting Logic</label>
                    <select id="weighting" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:border-blue-500 outline-none">
                        <option value="area">By Natural Image Area</option>
                        <option value="equal">Equal Weights</option>
                        <option value="random">Randomized Weights</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">Sorting</label>
                    <select id="sorting" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:border-blue-500 outline-none">
                        <option value="desc">Descending (Largest first - Best)</option>
                        <option value="asc">Ascending (Smallest first)</option>
                        <option value="none">Unsorted (Original order)</option>
                    </select>
                </div>

                <div class="pt-2">
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Internal Gap</label>
                        <span id="valGap" class="text-blue-400 font-mono">4px</span>
                    </div>
                    <input type="range" id="gap" min="0" max="32" value="4" class="w-full accent-blue-500">
                </div>
            </div>

            <!-- Styling & Effects -->
            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="palette" class="w-4 h-4"></i> Styling & Effects
                </h3>
                
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Background Color</label>
                        <span id="valBgColor" class="text-blue-400 font-mono">#1F2937</span>
                    </div>
                    <input type="color" id="bgColor" value="#1f2937" class="w-full h-8 cursor-pointer bg-gray-900 border border-gray-700 rounded p-1">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Block Rotation</label>
                        <span id="valRotation" class="text-blue-400 font-mono">0°</span>
                    </div>
                    <input type="range" id="rotation" min="0" max="360" value="0" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Corner Radius</label>
                        <span id="valRadius" class="text-blue-400 font-mono">0px</span>
                    </div>
                    <input type="range" id="radius" min="0" max="50" value="0" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <label class="text-gray-400">Book Cover Spine Width</label>
                        <span id="valBookCover" class="text-blue-400 font-mono">0%</span>
                    </div>
                    <input type="range" id="bookCover" min="0" max="100" value="0" class="w-full accent-blue-500">
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative checkerboard">
        <!-- Canvas Area (Utilizes safe grid centering to prevent top/left clipping) -->
        <div id="canvasContainer" class="flex-1 overflow-auto grid p-8" style="place-content: center safe;">
            <!-- scaleWrapper matches the exact physical bounds of the zoomed canvas so scrollbars activate perfectly -->
            <div id="scaleWrapper" class="transition-all duration-200 relative shrink-0" style="width: 800px; height: 600px;">
                <div id="renderCanvas" class="shadow-2xl absolute top-0 left-0 overflow-hidden ring-1 ring-gray-700 transition-transform duration-200" style="width: 800px; height: 600px; transform-origin: top left; background-color: #1f2937;">
                    <!-- Rectangles injected here via gridWrapper -->
                    <div class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm italic empty-state z-50 pointer-events-none">
                        Select a layout strategy and load images to begin.
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Zoom Controls -->
        <div class="fixed bottom-20 right-8 flex gap-1 z-50 bg-gray-800 p-1.5 rounded-lg border border-gray-700 shadow-xl opacity-90 hover:opacity-100">
            <button id="btnZoomOut" class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition-colors" title="Zoom Out"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
            <span id="zoomLabel" class="flex items-center justify-center w-12 text-xs font-mono text-gray-300">100%</span>
            <button id="btnZoomIn" class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition-colors" title="Zoom In"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
        </div>

        <!-- Metrics & Export Footer -->
        <footer class="bg-gray-900 border-t border-gray-800 p-4 flex justify-between items-center text-sm px-6">
            <div class="flex gap-8">
                <div class="flex items-center gap-2">
                    <i data-lucide="layers" class="w-4 h-4 text-gray-500"></i>
                    <span class="text-gray-400">Items:</span>
                    <span id="metricCount" class="font-mono text-white">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="box" class="w-4 h-4 text-gray-500"></i>
                    <span class="text-gray-400">Layout Bounds:</span>
                    <span id="metricSpace" class="font-mono text-blue-400">Waiting...</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnExportJPG" class="bg-gray-700 hover:bg-blue-600 text-white text-xs py-2 px-4 rounded flex items-center justify-center transition-colors shadow-md">
                    <i data-lucide="download" class="w-3 h-3 mr-2"></i> .JPG (Filled)
                </button>
                <button id="btnExportPNG" class="bg-gray-700 hover:bg-blue-600 text-white text-xs py-2 px-4 rounded flex items-center justify-center transition-colors shadow-md">
                    <i data-lucide="download" class="w-3 h-3 mr-2"></i> .PNG (Transparent)
                </button>
            </div>
        </footer>
    </main>

    <script>
        lucide.createIcons();

        // --- Core State Architecture ---
        let rawItems = [];
        let calculatedLayout = [];
        let zoomLevel = 1;
        
        const state = {
            layoutMode: 'justifiedRows',
            width: 800,
            height: 600,
            gap: 4,
            backgroundColor: '#1f2937',
            rotation: 0,
            borderRadius: 0,
            bookCover: 0
        };

        const layoutDescriptions = {
            justifiedRows: "Scales row heights slightly so every row perfectly matches the container width. The layout height expands dynamically.",
            justifiedColumns: "Scales column widths slightly so every column perfectly matches the container height. The layout width expands dynamically."
        };

        const canvas = document.getElementById('renderCanvas');
        const emptyState = document.querySelector('.empty-state');
        
        // --- UI Binding & Visibility Logic ---
        const updateUIPanels = () => {
            document.getElementById('modeDesc').textContent = layoutDescriptions[state.layoutMode];
            triggerLayout();
        };

        const bindControl = (id, stateKey, labelId, suffix = '') => {
            const el = document.getElementById(id);
            const label = document.getElementById(labelId);
            el.addEventListener(el.type === 'color' || el.tagName === 'SELECT' ? 'change' : 'input', (e) => {
                state[stateKey] = el.tagName === 'SELECT' || el.type === 'color' ? e.target.value : parseInt(e.target.value);
                if(label) label.textContent = state[stateKey] + suffix;
                
                if (stateKey === 'backgroundColor') canvas.style.backgroundColor = state.backgroundColor;
                if (stateKey === 'layoutMode') updateUIPanels();
                else triggerLayout();
            });
        };

        bindControl('layoutMode', 'layoutMode');
        bindControl('containerWidth', 'width', 'valWidth', 'px');
        bindControl('containerHeight', 'height', 'valHeight', 'px');
        bindControl('gap', 'gap', 'valGap', 'px');
        bindControl('rotation', 'rotation', 'valRotation', '°');
        bindControl('radius', 'borderRadius', 'valRadius', 'px');
        bindControl('bookCover', 'bookCover', 'valBookCover', '%');
        bindControl('bgColor', 'backgroundColor', 'valBgColor');

        updateUIPanels();

        // --- Data Input Handling ---
        document.getElementById('btnGenerateMock').addEventListener('click', () => {
            const count = Math.floor(Math.random() * 15) + 10; 
            const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'];
            rawItems = Array.from({length: count}).map((_, i) => ({
                id: `mock_${Date.now()}_${i}`,
                type: 'color',
                color: colors[Math.floor(Math.random() * colors.length)],
                naturalWidth: Math.floor(Math.random() * 800) + 200,
                naturalHeight: Math.floor(Math.random() * 600) + 200,
            }));
            triggerLayout();
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            rawItems = [];
            triggerLayout();
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            const newItems = await Promise.all(files.map(file => {
                return new Promise((resolve) => {
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    img.onload = () => resolve({
                        id: `img_${file.name}_${Date.now()}`, type: 'image', url: url, imgElement: img,
                        naturalWidth: img.width, naturalHeight: img.height, name: file.name
                    });
                    img.src = url;
                });
            }));
            
            rawItems = [...rawItems, ...newItems];
            triggerLayout();
        });

        // ==========================================
        // LAYOUT ENGINE
        // ==========================================

        const layoutStrategies = {
            justifiedRows: (items, cfg) => {
                let layout = [], currentY = 0, row = [], i = 0;
                while (i < items.length) {
                    let item = items[i];
                    let aspect = (item.naturalWidth / item.naturalHeight) || 1;
                    row.push({...item, aspect});
                    i++;
                    
                    let aspectSum = row.reduce((sum, r) => sum + r.aspect, 0);
                    let gapWidth = Math.max(0, (row.length - 1) * cfg.gap);
                    let availableWidth = Math.max(1, cfg.width - gapWidth);
                    let rowHeight = availableWidth / aspectSum;
                    
                    if (rowHeight < cfg.height * 0.5 || i === items.length) {
                        let currentX = 0;
                        row.forEach(r => {
                            let rWidth = rowHeight * r.aspect;
                            layout.push({ ...r, x: currentX, y: currentY, w: rWidth, h: rowHeight });
                            currentX += rWidth + cfg.gap;
                        });
                        currentY += rowHeight + cfg.gap;
                        row = []; 
                    }
                }
                return layout;
            },

            justifiedColumns: (items, cfg) => {
                let layout = [], currentX = 0, col = [], i = 0;
                while (i < items.length) {
                    let item = items[i];
                    let aspect = (item.naturalWidth / item.naturalHeight) || 1;
                    col.push({...item, aspect});
                    i++;
                    
                    // Instead of summing aspect ratio directly, we sum the inverse (1 / aspect) for vertical stacking
                    let invAspectSum = col.reduce((sum, r) => sum + (1 / r.aspect), 0);
                    let gapHeight = Math.max(0, (col.length - 1) * cfg.gap);
                    let availableHeight = Math.max(1, cfg.height - gapHeight);
                    let colWidth = availableHeight / invAspectSum;
                    
                    if (colWidth < cfg.width * 0.5 || i === items.length) {
                        let currentY = 0;
                        col.forEach(r => {
                            let rHeight = colWidth / r.aspect;
                            layout.push({ ...r, x: currentX, y: currentY, w: colWidth, h: rHeight });
                            currentY += rHeight + cfg.gap;
                        });
                        currentX += colWidth + cfg.gap;
                        col = []; 
                    }
                }
                return layout;
            }
        };

        // --- Core Execution Trigger ---
        function triggerLayout() {
            emptyState.style.display = rawItems.length ? 'none' : 'flex';
            if (rawItems.length === 0) {
                canvas.innerHTML = '';
                canvas.appendChild(emptyState);
                updateMetrics(0, 0, 0);
                return;
            }

            // 1. Assign Weights based on user config
            let processingItems = rawItems.map(item => {
                let weight = 1;
                if (state.weighting === 'area') weight = item.naturalWidth * item.naturalHeight;
                if (state.weighting === 'random') weight = Math.random() * 100 + 10;
                return { ...item, weight };
            });

            // 2. Sort data
            if (state.sorting === 'desc') processingItems.sort((a, b) => b.weight - a.weight);
            if (state.sorting === 'asc') processingItems.sort((a, b) => a.weight - b.weight);

            // 3. Strategy Execution
            calculatedLayout = layoutStrategies[state.layoutMode](processingItems, state);
            renderLayout(calculatedLayout);
        }

        // --- View & Render Layer ---
        function renderLayout(layoutData) {
            canvas.innerHTML = '';
            canvas.appendChild(emptyState);

            // Calculate final bounding box required based on the selected mode
            const maxLayoutY = layoutData.length ? Math.max(...layoutData.map(r => r.y + r.h)) : state.height;
            const maxLayoutX = layoutData.length ? Math.max(...layoutData.map(r => r.x + r.w)) : state.width;

            const layoutWidth = state.layoutMode === 'justifiedColumns' ? maxLayoutX : state.width;
            const layoutHeight = state.layoutMode === 'justifiedRows' ? maxLayoutY : state.height;

            canvas.style.width = `${layoutWidth}px`;
            canvas.style.height = `${layoutHeight}px`;

            // Setup Rotational Grouping Layer
            const rad = state.rotation * Math.PI / 180;
            const cos = Math.abs(Math.cos(rad));
            const sin = Math.abs(Math.sin(rad));
            const scaleFactor = cos + Math.max(layoutHeight / layoutWidth, layoutWidth / layoutHeight) * sin;

            const gridWrapper = document.createElement('div');
            gridWrapper.className = 'w-full h-full absolute inset-0';
            gridWrapper.style.transformOrigin = 'center';
            gridWrapper.style.transform = `rotate(${state.rotation}deg) scale(${scaleFactor})`;
            gridWrapper.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';

            layoutData.forEach(rect => {
                const el = document.createElement('div');
                el.className = 'rect-item absolute group';
                el.style.left = `${rect.x}px`;
                el.style.top = `${rect.y}px`;
                el.style.width = `${rect.w}px`;
                el.style.height = `${rect.h}px`;
                
                const inner = document.createElement('div');
                inner.style.borderRadius = `${state.borderRadius}px`;
                inner.className = `relative w-full h-full shadow-sm overflow-hidden ${rect.type === 'color' ? 'bg-gray-800' : ''} transition-transform duration-200 hover:scale-[1.02] hover:z-10 hover:shadow-lg border border-gray-700/50`;

                if (rect.type === 'image') {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'w-full h-full relative flex items-center justify-center bg-gray-900';
                    const img = document.createElement('img');
                    img.src = rect.url;
                    img.className = `w-full h-full object-cover`; 
                    imgContainer.appendChild(img);
                    inner.appendChild(imgContainer);
                } else {
                    inner.style.backgroundColor = rect.color;
                }

                if (state.bookCover > 0) {
                    const overlay = document.createElement('div');
                    overlay.className = 'absolute inset-0 pointer-events-none z-10';
                    const w = state.bookCover;
                    overlay.style.background = `
                        linear-gradient(to right, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0.2) ${w * 0.4}%, rgba(255,255,255,0.5) ${w * 0.6}%, rgba(0,0,0,0.1) ${w * 1.0}%, rgba(0,0,0,0) 100%),
                        linear-gradient(to left, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) ${w * 0.4}%)`;
                    inner.appendChild(overlay);
                }

                el.appendChild(inner);
                gridWrapper.appendChild(el);
            });

            canvas.appendChild(gridWrapper);
            updateMetrics(layoutData.length, layoutWidth, layoutHeight);
            updateZoom();
        }

        function updateMetrics(count, width, height) {
            document.getElementById('metricCount').textContent = count;
            document.getElementById('metricSpace').textContent = `${Math.round(width)}px × ${Math.round(height)}px`;
        }

        function updateZoom() {
            const wrapper = document.getElementById('scaleWrapper');
            canvas.style.transform = `scale(${zoomLevel})`;
            document.getElementById('zoomLabel').textContent = `${Math.round(zoomLevel * 100)}%`;
            if (wrapper) {
                const currentWidth = parseFloat(canvas.style.width) || state.width;
                const currentHeight = parseFloat(canvas.style.height) || state.height;
                wrapper.style.width = `${currentWidth * zoomLevel}px`;
                wrapper.style.height = `${currentHeight * zoomLevel}px`;
            }
        }

        document.getElementById('btnZoomIn').addEventListener('click', () => { zoomLevel = Math.min(zoomLevel + 0.1, 3); updateZoom(); });
        document.getElementById('btnZoomOut').addEventListener('click', () => { zoomLevel = Math.max(zoomLevel - 0.1, 0.1); updateZoom(); });

        // --- Export Engine ---
        function exportLayout(format = 'image/png', ext = 'png') {
            if (calculatedLayout.length === 0) return alert("Nothing to export!");

            const maxLayoutY = Math.max(...calculatedLayout.map(r => r.y + r.h));
            const maxLayoutX = Math.max(...calculatedLayout.map(r => r.x + r.w));

            const exportWidth = state.layoutMode === 'justifiedColumns' ? maxLayoutX : state.width;
            const exportHeight = state.layoutMode === 'justifiedRows' ? maxLayoutY : state.height;

            const offCanvas = document.createElement('canvas');
            offCanvas.width = exportWidth;
            offCanvas.height = exportHeight;
            const ctx = offCanvas.getContext('2d');
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            if (format === 'image/jpeg') {
                ctx.fillStyle = state.backgroundColor; 
                ctx.fillRect(0, 0, exportWidth, exportHeight);
            } else {
                ctx.clearRect(0, 0, exportWidth, exportHeight);
            }

            const rad = state.rotation * Math.PI / 180;
            const cos = Math.abs(Math.cos(rad));
            const sin = Math.abs(Math.sin(rad));
            const scaleFactor = cos + Math.max(exportHeight / exportWidth, exportWidth / exportHeight) * sin;

            ctx.save();
            ctx.translate(exportWidth / 2, exportHeight / 2);
            ctx.rotate(rad);
            ctx.scale(scaleFactor, scaleFactor);
            ctx.translate(-exportWidth / 2, -exportHeight / 2);

            calculatedLayout.forEach(rect => {
                ctx.save();
                ctx.beginPath();
                const maxRadius = Math.min(rect.w / 2, rect.h / 2, state.borderRadius);
                if (ctx.roundRect) ctx.roundRect(rect.x, rect.y, rect.w, rect.h, maxRadius);
                else ctx.rect(rect.x, rect.y, rect.w, rect.h);
                ctx.clip();

                if (rect.type === 'image' && rect.imgElement) {
                    if (format === 'image/jpeg') {
                        ctx.fillStyle = state.backgroundColor;
                        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                    }
                    
                    const imgAspect = rect.imgElement.width / rect.imgElement.height;
                    const boxAspect = rect.w / rect.h;
                    let renderW, renderH, renderX = rect.x, renderY = rect.y;

                    if (imgAspect > boxAspect) {
                        renderH = rect.h;
                        renderW = rect.h * imgAspect;
                        renderX = rect.x + (rect.w - renderW) / 2;
                    } else {
                        renderW = rect.w;
                        renderH = rect.w / imgAspect;
                        renderY = rect.y + (rect.h - renderH) / 2;
                    }
                    ctx.drawImage(rect.imgElement, renderX, renderY, renderW, renderH);
                } else {
                    ctx.fillStyle = rect.color || '#374151';
                    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                }

                if (state.bookCover > 0) {
                    const w = state.bookCover / 100;
                    const grad1 = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y);
                    grad1.addColorStop(0, 'rgba(255,255,255,0.4)');
                    grad1.addColorStop(Math.min(1, w * 0.4), 'rgba(0,0,0,0.2)');
                    grad1.addColorStop(Math.min(1, w * 0.6), 'rgba(255,255,255,0.5)');
                    grad1.addColorStop(Math.min(1, w * 1.0), 'rgba(0,0,0,0.1)');
                    grad1.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad1;
                    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                }
                ctx.restore(); 
            });

            ctx.restore(); 
            const link = document.createElement('a');
            link.download = `packing_layout.${ext}`;
            link.href = offCanvas.toDataURL(format, ext === 'jpg' ? 1.0 : undefined);
            link.click();
        }

        document.getElementById('btnExportPNG').addEventListener('click', () => exportLayout('image/png', 'png'));
        document.getElementById('btnExportJPG').addEventListener('click', () => exportLayout('image/jpeg', 'jpg'));

    </script>
</body>
</html>
